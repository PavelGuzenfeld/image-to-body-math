name: Build & Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions: read-all

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-24.04, cc: gcc-13, cxx: g++-13, build_type: Debug }
          - { os: ubuntu-24.04, cc: gcc-13, cxx: g++-13, build_type: Release }
          - { os: ubuntu-24.04, cc: gcc-14, cxx: g++-14, build_type: Debug }
          - { os: ubuntu-24.04, cc: gcc-14, cxx: g++-14, build_type: Release }
          - { os: ubuntu-24.04, cc: clang-17, cxx: clang++-17, build_type: Debug, stdlib: libc++ }
          - { os: ubuntu-24.04, cc: clang-17, cxx: clang++-17, build_type: Release, stdlib: libc++ }
          - { os: ubuntu-24.04, cc: clang-18, cxx: clang++-18, build_type: Debug, stdlib: libc++ }
          - { os: ubuntu-24.04, cc: clang-18, cxx: clang++-18, build_type: Release, stdlib: libc++ }
          - { os: windows-latest, cc: cl, cxx: cl, build_type: Debug }
          - { os: windows-latest, cc: cl, cxx: cl, build_type: Release }

    runs-on: ${{ matrix.os }}
    name: "${{ matrix.cc }} / ${{ matrix.build_type }}"

    steps:
      - uses: actions/checkout@v4

      - name: Install libc++
        if: matrix.stdlib == 'libc++'
        run: |
          LLVM_VER=$(echo "${{ matrix.cc }}" | grep -oP '\d+')
          sudo apt-get update -qq
          sudo apt-get install -y -qq libc++-${LLVM_VER}-dev libc++abi-${LLVM_VER}-dev

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
          CXXFLAGS: ${{ matrix.stdlib == 'libc++' && '-stdlib=libc++' || '' }}
          LDFLAGS: ${{ matrix.stdlib == 'libc++' && '-stdlib=libc++' || '' }}

      - name: Configure (MSVC)
        if: runner.os == 'Windows'
        run: cmake -B build

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Test
        run: ctest --test-dir build --build-config ${{ matrix.build_type }} --output-on-failure
